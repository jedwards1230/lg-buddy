# Single-file release pipeline (build-chain shape, modeled on jedwards1230/gpu-arbiter).
#
# Push to main (or manual dispatch). A `detect` job reads the merged PR's
# semver label — releases are OPT-IN: no semver:patch|minor|major label → no
# release. lg-buddy ships no compiled artifacts, but it now packages a
# versioned install tarball (bin/ + systemd/ + env example + README) plus a
# sha256 checksum and attaches both as GitHub Release assets.
#
# To do that it uses the build-chain pattern: the shared ai-release.yml@v1 is
# called with create_release: false (the `prepare` job) so it only computes the
# version, creates the tag, and emits the AI-generated release notes; a
# downstream `package` job builds the tarball from the TAGGED ref (the tag is
# the single source of truth) and a `release` job decodes the AI body and
# publishes the Release with the assets via softprops/action-gh-release.

name: Release

run-name: >-
  ${{
    github.event_name == 'workflow_dispatch'
      && format('Release: {0}{1}', inputs.dry_run && 'dry-run ' || '', inputs.bump_type)
      || format('Release: {0}', github.event.head_commit.message || github.sha)
  }}

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      bump_type:
        description: "Version bump type"
        required: true
        type: choice
        options: [patch, minor, major]
        default: patch
      dry_run:
        description: "Compute version + preview notes without tagging or publishing"
        required: false
        type: boolean
        default: false

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: read

jobs:
  detect:
    name: Detect bump type
    runs-on: ubuntu-latest
    outputs:
      bump_type: ${{ steps.bump.outputs.type }}
      dry_run: ${{ steps.bump.outputs.dry_run }}
      release: ${{ steps.bump.outputs.release }}
    steps:
      - name: Determine bump type
        id: bump
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TYPE="${{ inputs.bump_type }}"; DRY="${{ inputs.dry_run }}"; RELEASE="true"
          else
            LABELS=""
            for attempt in 1 2 3; do
              LABELS=$(gh pr list --state merged --base main --limit 100 \
                --json labels,mergeCommit \
                | jq -r --arg sha "$GITHUB_SHA" \
                  '.[] | select(.mergeCommit.oid == $sha) | .labels[].name' 2>/dev/null || echo "")
              [ -n "$LABELS" ] && break
              echo "Attempt ${attempt}: no labels for ${GITHUB_SHA} yet, retrying in 5s..."
              sleep 5
            done
            echo "Labels for ${GITHUB_SHA}: ${LABELS:-<none>}"
            DRY="false"
            if echo "$LABELS" | grep -q 'semver:major'; then TYPE="major"; RELEASE="true"
            elif echo "$LABELS" | grep -q 'semver:minor'; then TYPE="minor"; RELEASE="true"
            elif echo "$LABELS" | grep -q 'semver:patch'; then TYPE="patch"; RELEASE="true"
            else TYPE="none"; RELEASE="false"; echo "::notice::no semver:* label on the merged PR — skipping release"
            fi
          fi
          { echo "type=$TYPE"; echo "dry_run=$DRY"; echo "release=$RELEASE"; } >> "$GITHUB_OUTPUT"

  prepare:
    name: Tag & Generate Notes
    needs: [detect]
    if: needs.detect.outputs.release == 'true'
    uses: jedwards1230/release-workflows/.github/workflows/ai-release.yml@v1
    with:
      service_name: lg-buddy
      service_description: "a script that keeps an LG WebOS TV in sync with a Linux host's power and session state"
      bump_type: ${{ needs.detect.outputs.bump_type }}
      dry_run: ${{ needs.detect.outputs.dry_run == 'true' }}
      create_release: false
    secrets:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

  package:
    name: Package install tarball
    needs: [detect, prepare]
    if: needs.detect.outputs.release == 'true' && needs.detect.outputs.dry_run != 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout tagged commit
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.tag }}

      - name: Stage and package tarball
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          set -euo pipefail
          # The git tag is the single source of truth; this checkout is at the
          # tagged ref. Stage a clean tree (only the runtime files) into a
          # version-named dir, preserving the executable bit on bin/*.
          dir="lg-buddy-${VERSION}"
          mkdir -p "${dir}"
          cp -a bin "${dir}/bin"
          cp -a systemd "${dir}/systemd"
          cp -a lg-buddy.env.example "${dir}/lg-buddy.env.example"
          cp -a README.md "${dir}/README.md"
          chmod +x "${dir}"/bin/*

          echo "Tarball contents:"; find "${dir}" -type f | sort

          tar -czf "lg-buddy-${VERSION}.tar.gz" "${dir}"
          sha256sum "lg-buddy-${VERSION}.tar.gz" > "lg-buddy-${VERSION}.tar.gz.sha256"
          echo "Checksum:"; cat "lg-buddy-${VERSION}.tar.gz.sha256"

          # Fail loudly if the tarball wasn't produced at the expected path
          # (e.g. a VERSION miscalc), rather than leaving the upload step's
          # if-no-files-found to surface it later with misleading context.
          test -s "lg-buddy-${VERSION}.tar.gz" \
            || { echo "ERROR: expected tarball lg-buddy-${VERSION}.tar.gz missing or empty"; exit 1; }

      - name: Upload tarball artifacts
        uses: actions/upload-artifact@v7
        with:
          name: lg-buddy-tarball
          path: |
            lg-buddy-*.tar.gz
            lg-buddy-*.tar.gz.sha256
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: [detect, prepare, package]
    if: needs.detect.outputs.release == 'true' && needs.detect.outputs.dry_run != 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download tarball artifacts
        uses: actions/download-artifact@v8
        with:
          name: lg-buddy-tarball

      - name: Compose release body (install snippet + AI notes)
        env:
          BODY_B64: ${{ needs.prepare.outputs.release_body }}
          VERSION: ${{ needs.prepare.outputs.version }}
          TAG: ${{ needs.prepare.outputs.tag }}
        run: |
          set -euo pipefail
          # ai-release.yml emits a base64-encoded body to survive GitHub Actions'
          # job-output character restrictions; decode before use. Fail loudly on a
          # bad/empty decode so we never publish a Release with missing notes.
          echo "$BODY_B64" | base64 -d > /tmp/ai_body.md \
            || { echo "ERROR: failed to base64-decode release notes body"; exit 1; }
          test -s /tmp/ai_body.md \
            || { echo "ERROR: decoded release notes body is empty"; exit 1; }

          tgz="lg-buddy-${VERSION}.tar.gz"
          sha=$(awk '{print $1}' "${tgz}.sha256")

          # Prepend a short install snippet: fetch the tarball, verify the
          # checksum, unpack, then follow the README to enable the units.
          {
            echo "## Install"
            echo ""
            echo "Download the install tarball, verify its checksum, and unpack:"
            echo ""
            echo '```bash'
            echo "curl -fsSL -O https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}/${tgz}"
            echo "curl -fsSL -O https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}/${tgz}.sha256"
            echo "sha256sum -c ${tgz}.sha256"
            echo "tar -xzf ${tgz}"
            echo '```'
            echo ""
            echo "The tarball bundles \`bin/\`, \`systemd/\`, \`lg-buddy.env.example\`, and \`README.md\`."
            echo "Install \`bin/\` to \`/opt/lg-buddy/bin/\`, set up a \`bscpylgtv\` venv and"
            echo "\`/etc/lg-buddy/lg-buddy.env\`, install the units from \`systemd/\`, then enable:"
            echo ""
            echo '```bash'
            echo "systemctl enable --now lg-buddy.service lg-buddy-wake.service"
            echo "systemctl --user enable --now lg-buddy-unlock.service   # in the graphical session"
            echo '```'
            echo ""
            echo "| Artifact | sha256 |"
            echo "|----------|--------|"
            echo "| \`${tgz}\` | \`${sha}\` |"
            echo ""
            echo "---"
            echo ""
          } > /tmp/release_body.md
          cat /tmp/ai_body.md >> /tmp/release_body.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: Release ${{ needs.prepare.outputs.version }}
          body_path: /tmp/release_body.md
          make_latest: true
          files: |
            lg-buddy-*.tar.gz
            lg-buddy-*.tar.gz.sha256

      - name: Write workflow summary
        env:
          TAG: ${{ needs.prepare.outputs.tag }}
          VERSION: ${{ needs.prepare.outputs.version }}
          PREV: ${{ needs.prepare.outputs.prev_tag }}
          BUMP_TYPE: ${{ needs.prepare.outputs.bump_type }}
        run: |
          {
            echo "## Release ${TAG}"
            echo ""
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| Version | ${VERSION} |"
            echo "| Tag | ${TAG} |"
            echo "| Previous | ${PREV} |"
            echo "| Bump | ${BUMP_TYPE} |"
            echo "| Artifact | \`lg-buddy-${VERSION}.tar.gz\` (+ .sha256) |"
          } >> "$GITHUB_STEP_SUMMARY"

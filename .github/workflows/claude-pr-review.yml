# Claude PR review — calls the shared reusable workflow in
# jedwards1230/release-workflows, which runs claude-code-action@v1 in Haiku
# PR-review mode with the public jedwards1230-plugins marketplace + review-team
# plugin enabled by default. The focus below is appended to the base prompt.
name: PR Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

permissions:
  contents: read
  actions: read
  pull-requests: write
  id-token: write

jobs:
  review:
    uses: jedwards1230/release-workflows/.github/workflows/claude-pr-review.yml@v1
    secrets:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    with:
      focus: |
        lg-buddy is a Bash CLI + systemd units that keep an LG WebOS TV in sync
        with a Linux host's power/session state (via bscpylgtv + wakeonlan).
        - Shell safety: unquoted expansions and word-splitting, missing
          `set -euo pipefail`, command injection from env/args, unsafe `eval`,
          non-portable bashisms in `#!/bin/sh` scripts.
        - Secret handling: nothing sensitive committed; the TV key / config lives
          in lg-buddy.env (gitignored) — flag any leak into the repo or logs.
        - systemd correctness: ExecStart paths (units hardcode /opt/lg-buddy/bin),
          After/Wants ordering, system vs --user unit scope, Restart policy, and
          sleep-hook placement.
        - WebOS quirks: rapid bscpylgtv reconnects can trip the TV's `1008 EWS
          Try Again Later` throttle (does not self-clear) — flag connect loops
          without backoff/retry guards.
        Do NOT re-flag shfmt formatting nits — keep it to real correctness,
        safety, and reliability issues. You cannot run the scripts, so do not
        claim runtime results.

  pr-review:
    name: PR Review
    if: always()
    needs: [review]
    runs-on: ubuntu-latest
    steps:
      - name: Check review result
        run: |
          result="${{ needs.review.result }}"
          if [[ "$result" == "success" || "$result" == "skipped" ]]; then
            echo "PR Review passed (result: $result)"; exit 0
          fi
          echo "PR Review failed (result: $result)"; exit 1
